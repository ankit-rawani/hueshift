    <!-- Structured Data: FAQPage for LLM/Search enrichment -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Hueshift?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hueshift is a free, open-source color palette generator that uses the OKLCH color space for perceptually uniform palettes. It generates 11-shade color scales (50-950), semantic UI tokens for light and dark mode, and exports as Tailwind v4 @theme blocks, CSS custom properties, SCSS variables, or W3C design tokens. It also includes an MCP server so AI coding agents like Claude Code, Cursor, and Windsurf can use palettes directly."
          }
        },
        {
          "@type": "Question",
          "name": "How do I use Hueshift with Claude Code or Cursor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Install the MCP server with one command: 'claude mcp add hueshift-mcp -- npx hueshift-mcp@latest' for Claude Code, or add {\"command\": \"npx\", \"args\": [\"hueshift-mcp@latest\"]} to your .cursor/mcp.json for Cursor. The server provides 8 tools including palette generation, contrast checking, and export to Tailwind v4."
          }
        },
        {
          "@type": "Question",
          "name": "What is OKLCH and why use it for color palettes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "OKLCH is a perceptually uniform color space where equal steps in lightness, chroma, and hue look equally different to the human eye. This makes it ideal for generating consistent color scales — unlike HSL where 'lightness 50%' looks dramatically different across hues. Tailwind CSS v4 adopted OKLCH as its default color format. Hueshift generates all palettes in OKLCH and gamut-clamps to sRGB for browser compatibility."
          }
        },
        {
          "@type": "Question",
          "name": "How do I generate a Tailwind v4 color palette from a hex color?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Enter your hex color (e.g. #3b82f6) in Hueshift, choose a harmony mode (analogous, complementary, triadic, etc.), and click Generate. The tool creates a full palette with 11-shade scales for each color, maps semantic tokens (background, foreground, primary, muted, accent, destructive), checks WCAG/APCA contrast, and exports a ready-to-paste Tailwind v4 @theme block with both light and dark mode tokens."
          }
        },
        {
          "@type": "Question",
          "name": "Can I extract a color palette from an image?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Upload any image (PNG, JPG, WebP) and Hueshift extracts dominant colors using k-means clustering. It weights central pixels higher for logo-friendly extraction, ignores background colors, and generates full 11-shade OKLCH scales for each extracted color with semantic token mapping and contrast reports."
          }
        },
        {
          "@type": "Question",
          "name": "What export formats does Hueshift support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hueshift exports palettes in 6 formats: Tailwind v4 @theme blocks, CSS custom properties (variables), SCSS variables, W3C design tokens JSON, plain JSON, and hex color lists. All formats include both light and dark mode tokens with semantic role mapping following shadcn/ui conventions."
          }
        }
      ]
    }
    </script>
